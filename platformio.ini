[env:d1_mini_lite]
platform = espressif8266
board = d1_mini_lite
framework = arduino
lib_deps = 
	adafruit/Adafruit AHTX0@^2.0.5
	sciosense/ScioSense_ENS16x@^2.0.5
	khoih-prog/ESP8266_ISR_Servo@^1.3.0
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.4.2
